<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Virtual Fitting Room</title>
    <meta name="description" content="AI-powered virtual fitting room — try clothes on your personalised 3D avatar."/>
    <base href="/"/>
    <link rel="stylesheet" href="css/app.css"/>
    <link rel="icon" type="image/png" href="favicon.png"/>
    <link href="VFR.Web.styles.css" rel="stylesheet"/>
</head>

<body>
    <div id="app">
        <!-- Loading indicator while Blazor WASM downloads -->
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;
                    background:#0f1117;flex-direction:column;gap:1rem;font-family:Inter,sans-serif;color:#6366f1">
            <div style="font-size:2.5rem">👗</div>
            <div style="font-size:1rem;color:#94a3b8">Loading Virtual Fitting Room…</div>
            <svg width="40" height="40" viewBox="0 0 40 40" style="animation:spin .7s linear infinite">
                <circle cx="20" cy="20" r="16" fill="none" stroke="#6366f1" stroke-width="3"
                        stroke-dasharray="60" stroke-dashoffset="20" stroke-linecap="round"/>
            </svg>
            <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!-- Three.js avatar viewer (ES module) -->
    <script type="module" src="js/avatarViewer.js"></script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
